<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>KP Cleaning Stock</title>

<style>
/* Evita zoom al hacer double-tap o pinch */
html, body {
  touch-action: manipulation;
  -ms-touch-action: manipulation;
  overscroll-behavior: contain;
}

body{
  font-family:Arial;
  font-size:18px;
  padding:12px;
  text-align:center;
  max-width:500px;
  margin:0 auto;
  background:#f5f5f5;
}

.logo{
  width:120px;
  display:block;
  margin:auto;
  margin-bottom:8px;
}

h2{
  margin-bottom:3px;
  font-size:22px;
  color:#333;
  text-align:center;
}

.date{
  font-size:16px;
  color:#666;
  margin-bottom:8px;
  text-align:center;
}

/* Contenedor de cada producto */
.product-card {
  background:white;
  border-radius:10px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* Primera fila: nombre del producto */
.product-header {
  text-align:center;
  margin-bottom:10px;
  padding-bottom:8px;
  border-bottom:2px solid #f0f0f0;
}

.product-name {
  font-weight:700;
  font-size:16px;
  color:#333;
  line-height:1.3;
}

.product-unit {
  font-size:13px;
  color:#888;
  margin-top:2px;
}

/* Segunda fila: imagen y controles */
.product-controls {
  display:grid;
  grid-template-columns:80px 1fr;
  gap:12px;
  align-items:center;
}

.product-image-container {
  display:flex;
  justify-content:center;
  align-items:center;
}

.product-image {
  width:75px;
  height:75px;
  object-fit:cover;
  border-radius:8px;
  border:2px solid #eee;
  background:white;
}

/* Controles en grid */
.controls-grid {
  display:grid;
  grid-template-columns:50px 1fr 50px;
  gap:8px;
  align-items:center;
}

.controls-grid button {
  font-size:24px;
  padding:8px 0;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
  min-width:45px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.controls-grid button:disabled {
  opacity:0.4;
  cursor:not-allowed;
}

.controls-grid button.minus-btn {
  background:#dc3545;
  color:white;
}

.controls-grid button.minus-btn:hover:not(:disabled) {
  background:#c82333;
}

.controls-grid button.plus-btn {
  background:#28a745;
  color:white;
}

.controls-grid button.plus-btn:hover:not(:disabled) {
  background:#218838;
}

.controls-grid input {
  width:100%;
  font-size:22px;
  text-align:center;
  padding:8px 4px;
  border:2px solid #ddd;
  border-radius:8px;
  height:50px;
  box-sizing:border-box;
  max-width:120px;
  margin:0 auto;
}

.controls-grid input:disabled {
  background:#e9ecef;
  color:#666;
}

.controls-grid input::-webkit-outer-spin-button,
.controls-grid input::-webkit-inner-spin-button{
  -webkit-appearance:none;
  margin:0;
}

.controls-grid input[type=number]{
  -moz-appearance:textfield;
}

/* Orden resultante */
.order-result {
  margin-top:10px;
  padding:8px 12px;
  background:#e8f5e9;
  border-radius:6px;
  text-align:center;
  font-size:15px;
  border-left:4px solid #4caf50;
  min-height:30px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.order-result .order-label {
  font-weight:600;
  color:#2e7d32;
}

.order-result .order-qty {
  font-weight:700;
  font-size:17px;
  color:#1b5e20;
  margin:0 5px;
}

.order-result .order-unit {
  font-size:13px;
  color:#666;
  margin-left:4px;
}

/* Botones principales */
#submitBtn {
  font-size:22px;
  padding:14px 40px;
  margin:20px auto 10px;
  display:block;
  background:#28a745;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
  width:100%;
  max-width:300px;
}

#submitBtn:hover:not(:disabled) {
  background:#218838;
  transform:scale(1.02);
}

#submitBtn:disabled {
  opacity:0.5;
  cursor:not-allowed;
}

#resetBtn {
  font-size:18px;
  padding:12px 30px;
  display:block;
  margin:15px auto;
  display:none;
  background:#ffc107;
  color:#333;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
  width:100%;
  max-width:300px;
}

#resetBtn:hover:not(:disabled) {
  background:#e0a800;
}

.note {
  margin-top:15px;
  font-size:14px;
  color:#444;
  padding:12px;
  background:#fff3cd;
  border-radius:8px;
  border:1px solid #ffc107;
  text-align:center;
}

.loading {
  font-size:16px;
  color:#666;
  padding:30px;
  text-align:center;
}

#lastSubmit {
  font-size:15px;
  color:#28a745;
  margin-bottom:10px;
  padding:8px;
  background:#e8f5e9;
  border-radius:6px;
  text-align:center;
}

/* Responsive para móviles muy pequeños */
@media (max-width: 400px) {
  .product-controls {
    grid-template-columns:65px 1fr;
    gap:8px;
  }
  
  .product-image {
    width:60px;
    height:60px;
  }
  
  .controls-grid {
    grid-template-columns:40px 1fr 40px;
    gap:6px;
  }
  
  .controls-grid button {
    font-size:20px;
    height:44px;
    min-width:38px;
  }
  
  .controls-grid input {
    font-size:18px;
    height:44px;
    padding:6px 4px;
    max-width:80px;
  }
  
  .product-name {
    font-size:14px;
  }
}

/* Para tablets y pantallas más grandes */
@media (min-width: 601px) {
  .product-image {
    width:85px;
    height:85px;
  }
  
  .controls-grid input {
    max-width:100px;
  }
}
</style>
</head>

<body>

<img src="icon.png" class="logo">

<h2>🧹 KP Cleaning Stock</h2>

<div id="todayDate" class="date"></div>

<div id="lastSubmit"></div>

<button id="resetBtn" onclick="newForm()">🔄 NEW STOCK</button>

<div id="form"></div>

<button id="submitBtn" onclick="submitStock()">✅ SUBMIT</button>

<div class="note">
⚠️ Check again that everything is correct before submitting.<br>
<small>Make sure all fields are filled in.</small>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAlXXQKPaCRp3_TscUJaa06EyjI3rf9snogPN3zsqXg3FepxINq8MGbwX4SDSH13EM/exec";

// Mapeo completo de productos a imágenes
const PRODUCT_IMAGES = {
  "Blue Roll 1x6 (Bail)": "blue rool.png",
  "Toilet Roll 12x12 (bail)": "Toilet Roll 1.jpg",
  "Hand Soap 5L": "hand soap.jpg",
  "Wash 'n Walk 2x2Lt": "wash 'n walk.jpg",
  "Ecolab Click 4x5 Lt": "ecolab click.jpg",
  "Chromol 6x500ml": "chromol.jpg",
  "Mop Head Doubles": "mop head.jpg",
  "Sponge Back Scourer": "sponge.jpg",
  "Ecolab Epicare 5 Foam Hand Wash 750ml": "epicatre 5.jpg",
  "Tuffguy Scourer RS Pack 10": "TUFFGUY SCOURER RS PACK 10.webp",
  "Wheelie Bin Liner Black 46x54": "blak bag.jpg",
  "Safetouch Black gloves - Size L (1 box, 100 pairs)": "black gloves.jpg",
  "Ecolab Oasis Pro 20 Premium 2 Litre": "ecolab oasis pro 20.jpg",
  "Ecolab Solid Protect 4.5KG": "solid protect.jpg",
  "CleanWorks Compostable Refuse Sack Clear 26x44": "CleanWorks Compostable.jpg",
  "Country range large stainless steel scourers (10)": "Country range large stainless steel scourers.webp",
  "Optimax Extra - Multi Purpse Kitchen Degreaser 750ml": "OPTIMAX EXTRA - MULTI PURPOSE KITCHEN DEGREASER 750ML 6.jpg",
  "Ecolab Oasis Pro 16 Multi Purpose Cleaner": "Ecolab Oasis Pro 16 Multi Purpose Cleaner.jpg"
};

function setDate(){
  const today = new Date();
  const options = { weekday:'long', day:'numeric', month:'long' };
  document.getElementById("todayDate").innerText =
    today.toLocaleDateString('en-GB', options);
}

async function loadIngredients(){
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getCleaningProducts`);
    const data = await res.json();
    showForm(data);
  } catch(error) {
    document.getElementById("form").innerHTML = 
      '<div class="loading">❌ Error loading products. Please refresh.</div>';
    console.error("Error:", error);
  }
}

function showForm(data){
  const container = document.getElementById("form");
  container.innerHTML = "";
  
  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "product-card";
    
    const hasImage = PRODUCT_IMAGES[item.name] !== undefined;
    const escapedName = item.name.replace(/'/g, "\\'");
    
    let html = `
      <!-- Nombre del producto -->
      <div class="product-header">
        <div class="product-name">${item.name}</div>
        <div class="product-unit">${item.unit || ""}</div>
      </div>
      
      <!-- Controles -->
      <div class="product-controls">
    `;
    
    // Imagen (si existe)
    if(hasImage) {
      const imgName = PRODUCT_IMAGES[item.name];
      html += `
        <div class="product-image-container">
          <img src="${imgName}" class="product-image" alt="${item.name}" 
               onerror="this.style.display='none'; this.parentElement.style.display='none';">
        </div>
      `;
    } else {
      html += `
        <div class="product-image-container"></div>
      `;
    }
    
    html += `
        <div class="controls-grid">
          <button class="minus-btn" onclick="change('${escapedName}',-1)">−</button>
          <input 
            type="number"
            id="${item.name}"
            min="0"
            inputmode="numeric"
            pattern="[0-9]*"
            onkeydown="moveNext(event)"
            placeholder="0"
          >
          <button class="plus-btn" onclick="change('${escapedName}',1)">+</button>
        </div>
      </div>
      
      <!-- Resultado de orden -->
      <div class="order-result" id="order_${item.name}">
        <span style="color:#999; font-size:14px;">Order will appear here</span>
      </div>
    `;
    
    card.innerHTML = html;
    container.appendChild(card);
  });
  
  // Enfocar el primer input
  setTimeout(() => {
    const firstInput = document.querySelector("input");
    if(firstInput) firstInput.focus();
  }, 100);
}

function change(id, val){
  const input = document.getElementById(id);
  if(!input || input.disabled) return;
  
  let current = Number(input.value) || 0;
  current += val;
  if(current < 0) current = 0;
  input.value = current;
  
  // Disparar evento change para actualizar
  const event = new Event('change', { bubbles: true });
  input.dispatchEvent(event);
}

function moveNext(event){
  if(event.key === "Enter"){
    event.preventDefault();
    const inputs = Array.from(document.querySelectorAll("input"));
    const index = inputs.indexOf(event.target);
    if(index > -1 && index < inputs.length - 1){
      inputs[index+1].focus();
    }
  }
}

async function submitStock(){
  const inputs = document.querySelectorAll("input");
  const data = [];
  let missing = false;
  
  inputs.forEach(i => {
    if(i.value === "" || i.value === null) {
      missing = true;
    }
    data.push({ 
      name: i.id, 
      qty: Number(i.value) || 0 
    });
  });
  
  if(missing){
    alert("⚠️ Please fill in all stock levels before submitting.");
    return;
  }

  const confirmSubmit = confirm("Are you sure chef?");
  if(!confirmSubmit) return;

  // Bloquear inputs y botones
  inputs.forEach(i => i.disabled = true);
  document.querySelectorAll("button").forEach(b => {
    if(b.id !== "resetBtn") b.disabled = true;
  });
  document.getElementById("submitBtn").disabled = true;

  try {
    const res = await fetch(`${SCRIPT_URL}?action=submitCleaningStock&data=${encodeURIComponent(JSON.stringify(data))}`);
    const result = await res.json();
    showResult(result);
  } catch(error) {
    alert("❌ Error submitting. Please try again.");
    console.error("Error:", error);
    // Re-habilitar si hay error
    inputs.forEach(i => i.disabled = false);
    document.querySelectorAll("button").forEach(b => {
      if(b.id !== "resetBtn") b.disabled = false;
    });
    document.getElementById("submitBtn").disabled = false;
  }
}

function showResult(data){
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("resetBtn").style.display = "block";

  const now = new Date();
  const options = { weekday:'long', day:'numeric', month:'long', hour:'2-digit', minute:'2-digit' };
  document.getElementById("lastSubmit").innerHTML = 
    "✅ Last stock submitted: " + now.toLocaleDateString('en-GB', options);

  data.forEach(item => {
    const input = document.getElementById(item.prep);
    if(input) input.disabled = true;
    
    const container = document.getElementById("order_" + item.prep);
    if(!container) return;
    
    const qty = item.order;
    let unitText = item.unit || "";
    
    // Pluralizar si es necesario
    if(qty !== 1 && unitText && !unitText.includes("/") && !unitText.includes("x")) {
      if(unitText.endsWith("y")) unitText = unitText.slice(0,-1) + "ies";
      else if(!unitText.endsWith("s")) {
        unitText += "s";
      }
    }
    
    container.innerHTML = `
      <span class="order-label">📦 Order:</span>
      <span class="order-qty">${qty}</span>
      <span class="order-unit">${unitText}</span>
    `;
  });
}

function newForm(){
  document.getElementById("submitBtn").style.display = "block";
  document.getElementById("submitBtn").disabled = false;
  document.getElementById("resetBtn").style.display = "none";
  document.getElementById("lastSubmit").innerHTML = "";

  const inputs = document.querySelectorAll("input");
  inputs.forEach(i => {
    i.disabled = false;
    i.value = "";
  });

  const orders = document.querySelectorAll(".order-result");
  orders.forEach(o => {
    o.innerHTML = `<span style="color:#999; font-size:14px;">Order will appear here</span>`;
  });

  setTimeout(() => {
    const firstInput = document.querySelector("input");
    if(firstInput) firstInput.focus();
  }, 100);

  document.querySelectorAll("button").forEach(b => {
    if(b.id !== "resetBtn") b.disabled = false;
  });
}

setDate();
loadIngredients();
</script>

</body>
</html>
